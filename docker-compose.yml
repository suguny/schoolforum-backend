services:
  schoolforum:
    image: ghcr.io/sugeny/schoolforum:latest
    container_name: schoolforum
    restart: always
    network_mode: host
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
      - SPRING_PROFILES_ACTIVE=prod
    volumes:
      - /var/log/schoolforum:/var/log/schoolforum