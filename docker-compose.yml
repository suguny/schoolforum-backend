services:
  manticore:
    image: manticoresearch/manticore:latest
    container_name: manticore
    restart: always
    ports:
      - "9306:9306"
      - "9308:9308"
      - "9312:9312"
    volumes:
      - manticore_data:/var/lib/manticore
    environment:
      - TZ=Asia/Shanghai
      - EXTRA=1
    healthcheck:
      test: ["CMD", "mysqladmin", "-h", "127.0.0.1", "-P", "9306", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  schoolforum:
    image: ghcr.io/suguny/schoolforum-backend:latest
    container_name: schoolforum
    restart: always
    env_file:
      - .env
    command: ["sh", "-c", "java $JAVA_OPTS -jar app.jar"]
    environment:
      - TZ=Asia/Shanghai
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_ADDRESS=0.0.0.0
      - JAVA_OPTS=-Xms256m -Xmx512m
      - MANTICORE_HOST=${MANTICORE_HOST:-http://manticore}
      - MANTICORE_PORT=${MANTICORE_PORT:-9308}
    expose:
      - "8085"
    volumes:
      - /var/log/schoolforum:/var/log/schoolforum
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8085"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: schoolforum-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/schoolforum.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      schoolforum:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

  certbot:
    image: certbot/certbot
    container_name: schoolforum-certbot
    restart: unless-stopped
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: ["/bin/sh", "-c", "trap exit TERM; while :; do certbot renew --quiet --webroot -w /var/www/certbot; nginx -s reload 2>/dev/null || docker exec schoolforum-nginx nginx -s reload 2>/dev/null; sleep 12h & wait $${!}; done;"]

volumes:
  manticore_data:
  uploads_data:
  certbot_www:
