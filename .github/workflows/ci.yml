name: CI/CD

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: suguny/schoolforum-backend

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:9
        env:
          MYSQL_ROOT_PASSWORD: test123
          MYSQL_DATABASE: schoolforum_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - run: chmod +x mvnw && ./mvnw test -Dspring.profiles.active=test --batch-mode

  build:
    name: Build & Push Docker Image
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - uses: docker/setup-buildx-action@v3

      - name: Delete old GHCR package versions
        if: github.ref == 'refs/heads/master'
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'schoolforum-backend'
          package-type: 'container'
          min-versions-to-keep: 1

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate release tag
        if: github.ref == 'refs/heads/master'
        id: release_tag
        run: echo "tag=build-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v4
        if: github.ref == 'refs/heads/master'
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        if: github.ref == 'refs/heads/master'
        run: chmod +x mvnw && ./mvnw package -DskipTests --batch-mode

      - name: Create Release and Upload JAR
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true
          files: target/*.jar

      - name: Create Release for Tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true

  deploy:
    name: Deploy to Docker Server
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose and ssl script to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DOCKER_HOST }}
          username: ${{ secrets.DOCKER_USER }}
          key: ${{ secrets.DOCKER_SSH_KEY }}
          port: ${{ secrets.DOCKER_PORT || 22 }}
          source: docker-compose.yml,ssl/
          target: /opt/schoolforum/
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DOCKER_HOST }}
          username: ${{ secrets.DOCKER_USER }}
          key: ${{ secrets.DOCKER_SSH_KEY }}
          port: ${{ secrets.DOCKER_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            cd /opt/schoolforum

            echo "=== Generating keystore from certs ==="
            chmod +x ssl/generate-keystore.sh
            ./ssl/generate-keystore.sh

            echo "=== Stopping old containers ==="
            docker compose down --remove-orphans --timeout 10 2>/dev/null || true
            docker rm -f schoolforum schoolforum-nginx schoolforum-certbot 2>/dev/null || true
            docker network prune -f 2>/dev/null || true

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin

            echo "=== Pulling images ==="
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            echo "=== Starting services ==="
            docker compose up -d

            docker image prune -f
            echo "=== Deploy completed ==="
            docker compose ps