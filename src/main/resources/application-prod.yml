server:
  address: ${SERVER_ADDRESS:0.0.0.0}
  port: 8085

manticore:
  host: ${MANTICORE_HOST:http://127.0.0.1}
  port: ${MANTICORE_PORT:9308}

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://85.137.245.41:3306/schoolforum?characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 60000
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
      pool-name: SchoolForumHikariCP-Prod
      leak-detection-threshold: 30000

  data:
    redis:
      host: ${REDIS_HOST:85.137.245.41}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      database: 0
      timeout: 10s

  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:3342113181@qq.com}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

cors:
  allowed-origins: https://sugeny.github.io

oauth:
  github:
    client-id: ${GITHUB_CLIENT_ID:}
    client-secret: ${GITHUB_CLIENT_SECRET:}
    redirect-uri: ${GITHUB_REDIRECT_URI:http://85.137.245.41:8085/oauth/callback/github}

springdoc:
  swagger-ui:
    try-it-out-enabled: false

logging:
  level:
    com.example.schoolforum: info
    org.springframework.web: warn
    org.springframework.boot: warn
  file:
    path: ${LOG_PATH:/var/log/schoolforum}
