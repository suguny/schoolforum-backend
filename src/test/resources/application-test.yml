server:
  port: 8085

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/schoolforum_test?characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: test123
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: 127.0.0.1
      port: 6379

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

  mail:
    username: test@test.com

oauth:
  github:
    client-id: test
    client-secret: test
    redirect-uri: http://localhost:8085/oauth/callback/github

logging:
  level:
    com.example.schoolforum: warn
